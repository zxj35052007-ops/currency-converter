<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球实时汇率看板</title>
    <!-- 引入 Chart.js 图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #4f46e5; /* 主题蓝 */
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 30px;
            height: fit-content;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .currency-row {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .currency-col {
            flex: 1;
        }

        .swap-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2px; /* Align with inputs */
            transition: transform 0.2s;
        }

        .swap-btn:hover {
            transform: rotate(180deg);
        }

        .result-box {
            background: #f9fafb;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-top: 30px;
            border: 1px dashed #d1d5db;
        }

        .result-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 10px 0;
        }

        .rate-info {
            font-size: 14px;
            color: var(--text-sub);
        }

        button.convert-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
        }

        button.convert-btn:hover {
            opacity: 0.9;
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        #chartContainer {
            margin-top: 30px;
            height: 200px;
            width: 100%;
        }
        
        .loading-text {
            color: var(--text-sub);
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>💱 全球实时汇率看板</h1>
    </header>

    <div class="input-group">
        <label>金额 (Amount)</label>
        <input type="number" id="amount" value="1" min="0" step="any">
    </div>

    <div class="currency-row">
        <div class="currency-col">
            <label>从 (Base)</label>
            <select id="fromCurrency"></select>
        </div>
        
        <button class="swap-btn" id="swapBtn" title="交换货币">⇄</button>

        <div class="currency-col">
            <label>到 (Target)</label>
            <select id="toCurrency"></select>
        </div>
    </div>

    <button class="convert-btn" id="convertBtn">开始转换</button>

    <div class="result-box">
        <div class="rate-info" id="rateInfo">等待输入...</div>
        <div class="result-value" id="resultValue">---</div>
    </div>

    <div id="chartContainer">
        <canvas id="historyChart"></canvas>
    </div>
</div>

<script>
    // --- 配置区域 ---
    // 使用 ExchangeRate-API (免费公开端点，支持 CORS)
    const API_URL = 'https://api.exchangerate-api.com/v4/latest/USD'; 

    // DOM 元素
    const amountEl = document.getElementById('amount');
    const fromEl = document.getElementById('fromCurrency');
    const toEl = document.getElementById('toCurrency');
    const resultEl = document.getElementById('resultValue');
    const rateInfoEl = document.getElementById('rateInfo');
    const convertBtn = document.getElementById('convertBtn');
    const swapBtn = document.getElementById('swapBtn');
    
    let chartInstance = null;
    let exchangeRates = {}; // 存储所有汇率

    // 初始化
    async function init() {
        try {
            convertBtn.innerText = "加载中...";
            convertBtn.disabled = true;

            const res = await fetch(API_URL);
            if (!res.ok) throw new Error('网络请求失败');
            
            const data = await res.json();
            exchangeRates = data.rates;

            // 填充下拉菜单
            populateSelect(fromEl, Object.keys(exchangeRates), 'USD');
            populateSelect(toEl, Object.keys(exchangeRates), 'CNY');

            // 初始计算一次
            calculate();

            convertBtn.innerText = "开始转换";
            convertBtn.disabled = false;

        } catch (error) {
            console.error(error);
            rateInfoEl.innerText = "API 加载失败，请检查网络或稍后重试";
            resultEl.innerText = "Error";
        }
    }

    // 填充下拉框辅助函数
    function populateSelect(selectElement, currencies, defaultVal) {
        selectElement.innerHTML = '';
        currencies.forEach(currency => {
            const option = document.createElement('option');
            option.value = currency;
            option.text = `${currency} - ${getCurrencyName(currency)}`;
            if (currency === defaultVal) option.selected = true;
            selectElement.appendChild(option);
        });
    }

    // 简单的货币名称映射 (部分)
    function getCurrencyName(code) {
        const names = {
            'CNY': '人民币', 'USD': '美元', 'EUR': '欧元', 
            'JPY': '日元', 'HKD': '港币', 'GBP': '英镑', 
            'KRW': '韩元', 'TWD': '新台币'
        };
        return names[code] || code;
    }

    // 核心计算逻辑
    function calculate() {
        const amount = parseFloat(amountEl.value);
        const from = fromEl.value;
        const to = toEl.value;

        if (isNaN(amount)) {
            resultEl.innerText = "---";
            return;
        }

        // 计算逻辑：先转成基准货币(USD)，再转成目标货币
        // 公式： Amount / Rate(Base) * Rate(Target)
        const rateFrom = exchangeRates[from];
        const rateTo = exchangeRates[to];
        
        if (!rateFrom || !rateTo) {
            resultEl.innerText = "汇率缺失";
            return;
        }

        const rate = rateTo / rateFrom;
        const result = (amount * rate).toFixed(2);

        // 更新 UI
        resultEl.innerText = `${result} ${to}`;
        rateInfoEl.innerText = `1 ${from} ≈ ${rate.toFixed(4)} ${to}`;

        // 更新图表 (模拟历史走势，因为免费API通常不提供历史数据)
        updateChart(rate, from, to);
    }

    // 绘制图表
    function updateChart(currentRate, from, to) {
        const ctx = document.getElementById('historyChart').getContext('2d');
        
        // 生成模拟的近7天数据 (基于当前汇率上下浮动)
        const labels = ['6天前', '5天前', '4天前', '3天前', '2天前', '昨天', '今天'];
        const dataPoints = [];
        
        for(let i=0; i<6; i++) {
            // 简单的随机波动算法
            const volatility = currentRate * 0.02; // 2% 波动
            const randomChange = (Math.random() - 0.5) * volatility;
            dataPoints.push(currentRate + randomChange);
        }
        dataPoints.push(currentRate); // 最后一个是真实值

        if (chartInstance) {
            chartInstance.destroy();
        }

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: `${from} 兑 ${to} 汇率走势 (模拟)`,
                    data: dataPoints,
                    borderColor: '#4f46e5',
                    backgroundColor: 'rgba(79, 70, 229, 0.1)',
                    tension: 0.4,
                    fill: true,
                    pointRadius: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { beginAtZero: false }
                }
            }
        });
    }

    // 事件监听
    convertBtn.addEventListener('click', calculate);
    
    swapBtn.addEventListener('click', () => {
        const temp = fromEl.value;
        fromEl.value = toEl.value;
        toEl.value = temp;
        calculate();
    });

    // 输入变化自动计算 (可选)
    amountEl.addEventListener('input', calculate);
    fromEl.addEventListener('change', calculate);
    toEl.addEventListener('change', calculate);

    // 启动
    init();

</script>
</body>
</html>
