<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球实时汇率看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ========== CSS 变量 ========== */
        :root {
            --primary:        #6366f1;
            --primary-dark:   #4f46e5;
            --primary-light:  #818cf8;
            --accent:         #f59e0b;
            --accent-light:   #fbbf24;
            --success:        #10b981;
            --danger:         #ef4444;
            --predict:        #f97316;

            --bg-start:       #eef2ff;
            --bg-mid:         #e0e7ff;
            --bg-end:         #f0fdf4;
            --card-bg:        rgba(255,255,255,0.85);
            --card-border:    rgba(255,255,255,0.6);

            --text:           #1e293b;
            --text-sub:       #64748b;

            --radius-sm:      8px;
            --radius:         14px;
            --radius-lg:      22px;

            --shadow-sm:      0 1px 3px rgba(0,0,0,0.06);
            --shadow:         0 8px 30px rgba(99,102,241,0.12);
            --shadow-lg:      0 20px 50px rgba(99,102,241,0.18);
            --shadow-glow:    0 0 30px rgba(99,102,241,0.25);

            --transition:     0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow:0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ========== 全局重置 ========== */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
            color: var(--text);
            margin: 0;
            padding: 32px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            line-height: 1.6;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,102,241,0.10) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 85% 90%, rgba(16,185,129,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(245,158,11,0.06) 0%, transparent 60%),
                linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 40%, var(--bg-end) 100%);
            background-attachment: fixed;
        }

        /* ========== 主容器 ========== */
        .container {
            width: 100%;
            max-width: 1080px;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow), var(--shadow-sm);
            padding: 48px 44px;
            height: fit-content;
            animation: cardAppear 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
            transition: box-shadow var(--transition-slow);
        }

        .container:hover {
            box-shadow: var(--shadow-lg), var(--shadow-glow);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ========== 顶部装饰条 ========== */
        .header-accent {
            width: 60px;
            height: 4px;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            margin: 0 auto 20px;
            animation: accentPulse 3s ease-in-out infinite;
        }

        @keyframes accentPulse {
            0%, 100% { opacity: 0.7; width: 60px; }
            50%      { opacity: 1;   width: 80px; }
        }

        /* ========== 标题 ========== */
        .title {
            text-align: center;
            margin: 0 0 36px;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 40%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ========== 表单区域 ========== */
        .form-group { margin-bottom: 26px; }

        .form-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .label-icon { font-size: 15px; line-height: 1; }

        .form-input,
        .form-select {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #e2e8f0;
            border-radius: var(--radius);
            font-size: 16px;
            outline: none;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            color: var(--text);
            transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition), background var(--transition);
            appearance: none;
            -webkit-appearance: none;
        }

        .form-input:hover,
        .form-select:hover {
            border-color: #c7d2fe;
            background: rgba(255,255,255,0.9);
        }

        .form-input:focus,
        .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.12), 0 4px 12px rgba(99,102,241,0.08);
            background: #fff;
            transform: translateY(-1px);
        }

        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: '';
            position: absolute;
            right: 16px; top: 50%;
            transform: translateY(-50%);
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 6px solid #94a3b8;
            pointer-events: none;
            transition: border-top-color var(--transition);
        }
        .select-wrapper:focus-within::after { border-top-color: var(--primary); }

        /* ========== 货币选择行 ========== */
        .currency-row {
            display: flex;
            gap: 18px;
            align-items: flex-end;
            margin-bottom: 26px;
        }
        .currency-col { flex: 1; }

        /* ========== 交换按钮 ========== */
        .swap-btn {
            position: relative;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 48px; height: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2px;
            font-size: 22px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(99,102,241,0.3);
            transition: transform var(--transition), box-shadow var(--transition);
        }
        .swap-btn::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            opacity: 0;
            transition: opacity var(--transition);
            z-index: -1;
        }
        .swap-btn:hover {
            transform: rotate(180deg) scale(1.08);
            box-shadow: 0 6px 20px rgba(99,102,241,0.45);
        }
        .swap-btn:hover::before { opacity: 0.4; }
        .swap-btn:active { transform: rotate(180deg) scale(0.95); }
        .swap-btn:focus-visible { outline: 3px solid var(--primary-light); outline-offset: 3px; }

        /* ========== 主按钮 ========== */
        .btn-primary {
            position: relative;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius);
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            color: #fff;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            box-shadow: 0 6px 18px rgba(99,102,241,0.3);
            transition: transform var(--transition), box-shadow var(--transition), filter var(--transition);
            overflow: hidden;
        }
        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.6s ease;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(99,102,241,0.4);
            filter: brightness(1.05);
        }
        .btn-primary:hover:not(:disabled)::after { left: 100%; }
        .btn-primary:active:not(:disabled) { transform: translateY(0) scale(0.98); }
        .btn-primary:disabled {
            background: linear-gradient(135deg, #cbd5e1, #94a3b8);
            box-shadow: none;
            cursor: not-allowed;
            filter: none;
        }
        .btn-primary:focus-visible { outline: 3px solid var(--primary-light); outline-offset: 3px; }

        @keyframes btnPulse {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.6; }
        }
        .btn-primary.is-loading { animation: btnPulse 1.4s ease-in-out infinite; }

        /* ========== 结果展示 ========== */
        .result-box {
            position: relative;
            margin-top: 36px;
            padding: 30px 24px;
            text-align: center;
            border-radius: var(--radius);
            background: linear-gradient(135deg, rgba(99,102,241,0.04) 0%, rgba(16,185,129,0.04) 100%);
            border: 1px solid rgba(99,102,241,0.15);
            overflow: hidden;
            animation: resultIn 0.5s ease both;
        }
        @keyframes resultIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .result-box::before {
            content: '';
            position: absolute;
            top: -1px; left: 50%;
            transform: translateX(-50%);
            width: 60%; height: 2px;
            border-radius: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-light), transparent);
        }

        .result-value {
            font-size: 40px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-dark), #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 14px 0;
            letter-spacing: -0.02em;
            transition: all var(--transition);
            word-break: break-all;
        }
        .result-value.is-updated {
            animation: valueFlash 0.5s ease;
        }
        @keyframes valueFlash {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.04); }
        }

        .result-info { font-size: 15px; color: var(--text-sub); }

        /* ========== 图表网格布局 ========== */
        .charts-section {
            margin-top: 36px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
        }

        .chart-panel {
            background: rgba(255,255,255,0.55);
            border-radius: var(--radius);
            border: 1px solid rgba(226,232,240,0.8);
            padding: 24px 20px 20px;
            display: flex;
            flex-direction: column;
        }

        .chart-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .chart-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.03em;
        }

        .chart-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 10px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .chart-badge--history {
            background: rgba(99,102,241,0.12);
            color: var(--primary-dark);
        }

        .chart-badge--predict {
            background: rgba(249,115,22,0.12);
            color: var(--predict);
        }

        .chart-body {
            flex: 1;
            position: relative;
            min-height: 300px;
        }

        /* 预测置信度提示 */
        .prediction-note {
            text-align: center;
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 10px;
        }

        /* ========== 状态提示 ========== */
        .status-loading { color: var(--primary); }
        .status-error  { color: var(--danger); }

        /* ========== 响应式 ========== */
        @media (max-width: 900px) {
            body { padding: 16px; }
            .container { padding: 28px 20px; border-radius: var(--radius); }
            .title { font-size: 22px; }
            .result-value { font-size: 30px; }

            .charts-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .chart-body { min-height: 250px; }

            .currency-row { flex-direction: column; gap: 14px; }
            .swap-btn {
                align-self: center;
                margin-bottom: 0;
                transform: rotate(90deg);
            }
            .swap-btn:hover { transform: rotate(270deg) scale(1.08); }
        }

        /* ========== 无障碍 ========== */
        .sr-only {
            position: absolute;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border-width: 0;
        }

        /* ========== 打印 ========== */
        @media print {
            body { background: #fff; padding: 0; }
            .container { box-shadow: none; backdrop-filter: none; border: none; }
            .btn-primary, .swap-btn, .header-accent { display: none; }
        }
    </style>
</head>
<body>

    <main class="container" role="main">

        <div class="header-accent" aria-hidden="true"></div>

        <h1 class="title">💱 全球实时汇率看板</h1>

        <!-- 金额输入 -->
        <div class="form-group">
            <label class="form-label" for="amount">
                <span class="label-icon" aria-hidden="true">💰</span>金额
            </label>
            <input
                class="form-input"
                type="number"
                id="amount"
                value="1"
                min="0"
                step="any"
                inputmode="decimal"
                placeholder="输入金额"
                aria-describedby="amount-hint"
            >
            <span id="amount-hint" class="sr-only">请输入要转换的金额，支持小数</span>
        </div>

        <!-- 货币选择 -->
        <div class="currency-row">
            <div class="currency-col">
                <label class="form-label" for="fromCur">
                    <span class="label-icon" aria-hidden="true">🌍</span>源货币
                </label>
                <div class="select-wrapper">
                    <select class="form-select" id="fromCur" aria-label="选择源货币"></select>
                </div>
            </div>

            <button class="swap-btn" id="swapBtn" type="button" aria-label="交换源货币与目标货币" title="交换货币">⇄</button>

            <div class="currency-col">
                <label class="form-label" for="toCur">
                    <span class="label-icon" aria-hidden="true">🎯</span>目标货币
                </label>
                <div class="select-wrapper">
                    <select class="form-select" id="toCur" aria-label="选择目标货币"></select>
                </div>
            </div>
        </div>

        <button class="btn-primary" id="calcBtn" type="button">⚡ 开始转换</button>

        <!-- 结果展示 -->
        <section class="result-box" aria-live="polite" aria-atomic="true">
            <div class="result-info" id="rateInfo">等待输入...</div>
            <div class="result-value" id="resVal" aria-label="转换结果">---</div>
        </section>

        <!-- 双图表区域 -->
        <section class="charts-section" aria-label="汇率图表">
            <div class="charts-grid">

                <!-- 历史走势 -->
                <div class="chart-panel">
                    <div class="chart-header">
                        <span class="chart-title">📈 历史走势</span>
                        <span class="chart-badge chart-badge--history">7 天</span>
                    </div>
                    <div class="chart-body">
                        <canvas id="chartHistory"></canvas>
                    </div>
                </div>

                <!-- 趋势预测 -->
                <div class="chart-panel">
                    <div class="chart-header">
                        <span class="chart-title">🔮 趋势预测</span>
                        <span class="chart-badge chart-badge--predict">未来 3 天</span>
                    </div>
                    <div class="chart-body">
                        <canvas id="chartPredict"></canvas>
                    </div>
                    <div class="prediction-note">基于近 7 日数据线性回归预测，仅供参考</div>
                </div>

            </div>
        </section>

    </main>

    <script>
    (() => {
        'use strict';

        // ========== 常量 ==========
        const CURRENCY_NAMES = {
            'CNY': '人民币', 'USD': '美元', 'EUR': '欧元', 'GBP': '英镑', 'JPY': '日元',
            'HKD': '港币', 'TWD': '新台币', 'KRW': '韩元', 'SGD': '新加坡元', 'AUD': '澳元',
            'CAD': '加拿大元', 'CHF': '瑞士法郎', 'THB': '泰铢', 'MYR': '马来西亚林吉特',
            'RUB': '俄罗斯卢布', 'INR': '印度卢比', 'VND': '越南盾', 'PHP': '菲律宾比索',
            'IDR': '印尼盾', 'NZD': '新西兰元', 'SEK': '瑞典克朗', 'NOK': '挪威克朗',
            'DKK': '丹麦克朗', 'PLN': '波兰兹罗提', 'TRY': '土耳其里拉', 'ZAR': '南非兰特',
            'MXN': '墨西哥比索', 'BRL': '巴西雷亚尔', 'AED': '阿联酋迪拉姆', 'SAR': '沙特里亚尔'
        };

        const API_URL   = 'https://api.exchangerate-api.com/v4/latest/USD';
        const STALE_MS  = 30 * 60 * 1000;
        const CACHE_KEY = 'fx_rates_cache';

        const HISTORY_DAYS  = 7;
        const PREDICT_DAYS  = 3;

        const COLORS = {
            historyLine:  '#6366f1',
            historyFill:  ['rgba(99,102,241,0.25)', 'rgba(99,102,241,0.02)'],
            historyPoint: '#6366f1',
            predictLine:  '#f97316',
            predictFill:  ['rgba(249,115,22,0.15)', 'rgba(249,115,22,0.01)'],
            predictPoint: '#f97316',
            separator:    '#94a3b8',
            grid:         'rgba(226,232,240,0.6)',
            tick:         '#94a3b8',
        };

        // ========== DOM 引用 ==========
        const $ = (id) => document.getElementById(id);
        const dom = {
            amount:       $('amount'),
            fromCur:      $('fromCur'),
            toCur:        $('toCur'),
            calcBtn:      $('calcBtn'),
            swapBtn:      $('swapBtn'),
            rateInfo:     $('rateInfo'),
            resVal:       $('resVal'),
            chartHistory: $('chartHistory'),
            chartPredict: $('chartPredict'),
        };

        // ========== 状态 ==========
        let rates        = {};
        let chartHistory = null;
        let chartPredict = null;

        // ========== 工具函数 ==========
        const getName = (code) => CURRENCY_NAMES[code] || code;

        function loadRatesCache() {
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                const { data, ts } = JSON.parse(raw);
                if (Date.now() - ts > STALE_MS) return null;
                return data;
            } catch { return null; }
        }

        function saveRatesCache(data) {
            try { localStorage.setItem(CACHE_KEY, JSON.stringify({ data, ts: Date.now() })); }
            catch { /* ignore */ }
        }

        function mulberry32(a) {
            return () => { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };
        }

        function generateHistory(curRate, fromCode, toCode) {
            const seedStr = fromCode + '_' + toCode;
            let seed = 0;
            for (let i = 0; i < seedStr.length; i++) {
                seed = ((seed << 5) - seed) + seedStr.charCodeAt(i);
                seed |= 0;
            }
            const rand = mulberry32(Math.abs(seed));

            const points = [];
            let val = curRate;
            for (let i = 0; i < 6; i++) {
                val /= (1 + (rand() - 0.5) * 0.04);
            }
            points.push(val);
            for (let i = 1; i < HISTORY_DAYS; i++) {
                const jitter = 1 + (rand() - 0.5) * 0.04;
                points.push(points[i - 1] * jitter);
            }
            return points;
        }

        function linearRegression(xs, ys) {
            const n = xs.length;
            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
            for (let i = 0; i < n; i++) {
                sumX  += xs[i];
                sumY  += ys[i];
                sumXY += xs[i] * ys[i];
                sumX2 += xs[i] * xs[i];
            }
            const slope     = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
            const intercept = (sumY - slope * sumX) / n;
            return { slope, intercept, predict: (x) => slope * x + intercept };
        }

        function createGradient(ctx, height, colorStops) {
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, colorStops[0]);
            grad.addColorStop(1, colorStops[1]);
            return grad;
        }

        // ========== 数值闪烁动画 ==========
        function flashResultValue() {
            dom.resVal.classList.remove('is-updated');
            void dom.resVal.offsetWidth;
            dom.resVal.classList.add('is-updated');
        }

        // ========== 初始化 ==========
        async function init() {
            const btn = dom.calcBtn;

            const cached = loadRatesCache();
            if (cached) {
                rates = cached;
                populateSelects();
                calculate();
                btn.innerHTML = '⚡ 开始转换';
                btn.disabled = false;
                return;
            }

            btn.innerHTML = '<span style="display:inline-block;animation:btnPulse 1.4s ease-in-out infinite">⏳ 数据加载中...</span>';
            btn.disabled = true;

            try {
                const res  = await fetch(API_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                rates = data.rates;
                saveRatesCache(rates);
                populateSelects();
                calculate();
                btn.innerHTML = '⚡ 开始转换';
                btn.disabled = false;
            } catch (e) {
                console.error('汇率数据加载失败：', e);
                dom.rateInfo.innerText = '网络异常，请刷新重试';
                dom.rateInfo.classList.add('status-error');
                btn.innerHTML = '🔄 重新加载';
                btn.disabled = false;
            }
        }

        // ========== 下拉框填充 ==========
        function populateSelects() {
            const codes = Object.keys(rates).sort(
                (a, b) => getName(a).localeCompare(getName(b), 'zh')
            );
            fillSelect(dom.fromCur, codes, 'USD');
            fillSelect(dom.toCur,   codes, 'CNY');
        }

        function fillSelect(el, codes, defaultCode) {
            const frag = document.createDocumentFragment();
            codes.forEach((c) => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = `${getName(c)}（${c}）`;
                if (c === defaultCode) opt.selected = true;
                frag.appendChild(opt);
            });
            el.innerHTML = '';
            el.appendChild(frag);
        }

        // ========== 核心计算 ==========
        function calculate() {
            const amt = parseFloat(dom.amount.value);
            if (isNaN(amt) || amt < 0) {
                dom.resVal.innerText = '请输入有效金额';
                dom.rateInfo.innerText = '';
                return;
            }

            const from = dom.fromCur.value;
            const to   = dom.toCur.value;
            if (!rates[from] || !rates[to]) return;

            const rate     = rates[to] / rates[from];
            const result   = (amt * rate).toFixed(2);
            const fromName = getName(from);
            const toName   = getName(to);

            dom.resVal.innerText   = `${result} ${toName}`;
            dom.rateInfo.innerText = `1 ${fromName} ≈ ${rate.toFixed(4)} ${toName}`;
            flashResultValue();

            renderCharts(rate, from, to);
        }

        // ========== 图表渲染 ==========
        function renderCharts(curRate, from, to) {
            const fromName = getName(from);
            const toName   = getName(to);
            const pairLabel = `${fromName} → ${toName}`;

            const historyData = generateHistory(curRate, from, to);
            const xs = Array.from({ length: HISTORY_DAYS }, (_, i) => i);
            const reg = linearRegression(xs, historyData);
            const predictData = [];
            for (let i = 0; i < PREDICT_DAYS; i++) {
                predictData.push(reg.predict(HISTORY_DAYS + i));
            }

            renderHistoryChart(curRate, fromName, toName, pairLabel, historyData);
            renderPredictChart(curRate, fromName, toName, pairLabel, historyData, predictData);
        }

        // ========== 图表 1：历史走势 ==========
        function renderHistoryChart(curRate, fromName, toName, pairLabel, historyData) {
            const ctx  = dom.chartHistory.getContext('2d');
            const grad = createGradient(ctx, 300, COLORS.historyFill);

            const labels   = ['6天前', '5天前', '4天前', '3天前', '2天前', '昨天', '今天'];
            const minVal   = Math.min(...historyData) * 0.998;
            const maxVal   = Math.max(...historyData) * 1.002;

            const data = {
                labels,
                datasets: [{
                    label: pairLabel,
                    data: historyData,
                    borderColor: COLORS.historyLine,
                    backgroundColor: grad,
                    tension: 0.4,
                    fill: true,
                    pointRadius: historyData.map((_, i) => i === HISTORY_DAYS - 1 ? 6 : 4),
                    pointHoverRadius: 7,
                    pointBackgroundColor: COLORS.historyPoint,
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    borderWidth: 2.5,
                }]
            };

            const opts = commonChartOpts(fromName, toName, minVal, maxVal);

            if (chartHistory) {
                chartHistory.data = data;
                chartHistory.options = opts;
                chartHistory.update();
            } else {
                chartHistory = new Chart(ctx, { type: 'line', data, options: opts });
            }
        }

        // ========== 图表 2：趋势预测 ==========
        function renderPredictChart(curRate, fromName, toName, pairLabel, historyData, predictData) {
            const ctx  = dom.chartPredict.getContext('2d');

            const histGrad    = createGradient(ctx, 300, COLORS.historyFill);
            const predictGrad = createGradient(ctx, 300, COLORS.predictFill);

            const allLabels = [
                '6天前', '5天前', '4天前', '3天前', '2天前', '昨天', '今天',
                '明天', '后天', '3天后'
            ];

            const histDataset = {
                label: '历史汇率',
                data: [...historyData, null, null, null],
                borderColor: COLORS.historyLine,
                backgroundColor: histGrad,
                tension: 0.4,
                fill: true,
                pointRadius: historyData.map((_, i) => i === HISTORY_DAYS - 1 ? 6 : 4),
                pointHoverRadius: 7,
                pointBackgroundColor: COLORS.historyPoint,
                pointBorderColor: '#fff',
                pointBorderWidth: 2,
                borderWidth: 2.5,
                order: 1,
            };

            const predictDataset = {
                label: '预测汇率',
                data: [null, null, null, null, null, null, historyData[HISTORY_DAYS - 1], ...predictData],
                borderColor: COLORS.predictLine,
                backgroundColor: predictGrad,
                tension: 0.4,
                fill: true,
                pointRadius: [0, 0, 0, 0, 0, 0, 6, 5, 5, 5],
                pointHoverRadius: 7,
                pointBackgroundColor: COLORS.predictPoint,
                pointBorderColor: '#fff',
                pointBorderWidth: 2,
                borderWidth: 2.5,
                borderDash: [8, 4],
                order: 0,
            };

            const allVals = [...historyData, ...predictData];
            const minVal  = Math.min(...allVals) * 0.998;
            const maxVal  = Math.max(...allVals) * 1.002;

            const separatorPlugin = {
                id: 'predictionSeparator',
                afterDraw(chart) {
                    const { ctx, chartArea, scales } = chart;
                    const xAxis = scales.x;
                    const todayIdx = 6;
                    const xPos = xAxis.getPixelForValue(allLabels[todayIdx]);

                    const predictStartX = xPos;
                    const predictEndX   = chartArea.right;
                    ctx.save();
                    ctx.fillStyle = 'rgba(249,115,22,0.05)';
                    ctx.fillRect(predictStartX, chartArea.top, predictEndX - predictStartX, chartArea.bottom - chartArea.top);

                    ctx.beginPath();
                    ctx.setLineDash([5, 5]);
                    ctx.strokeStyle = COLORS.separator;
                    ctx.lineWidth = 1.5;
                    ctx.moveTo(xPos, chartArea.top);
                    ctx.lineTo(xPos, chartArea.bottom);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    const labelX = (predictStartX + predictEndX) / 2;
                    const labelY = chartArea.top + 16;
                    ctx.font = 'bold 12px -apple-system, "Microsoft YaHei", sans-serif';
                    ctx.fillStyle = COLORS.predictLine;
                    ctx.textAlign = 'center';
                    ctx.fillText('预测区域', labelX, labelY);

                    ctx.restore();
                }
            };

            const data = {
                labels: allLabels,
                datasets: [histDataset, predictDataset],
            };

            const opts = commonChartOpts(fromName, toName, minVal, maxVal);
            opts.plugins.legend = {
                display: true,
                position: 'bottom',
                labels: {
                    usePointStyle: true,
                    pointStyleWidth: 10,
                    padding: 20,
                    font: { size: 12 },
                    color: '#64748b',
                }
            };

            if (chartPredict) {
                chartPredict.data = data;
                chartPredict.options = opts;
                chartPredict.update();
            } else {
                chartPredict = new Chart(ctx, {
                    type: 'line',
                    data,
                    options: opts,
                    plugins: [separatorPlugin],
                });
            }
        }

        // ========== 通用图表配置 ==========
        function commonChartOpts(fromName, toName, minVal, maxVal) {
            return {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 800, easing: 'easeOutQuart' },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        backgroundColor: 'rgba(30,41,59,0.92)',
                        titleFont: { size: 13, weight: 'bold' },
                        bodyFont: { size: 13 },
                        padding: 14,
                        cornerRadius: 8,
                        displayColors: true,
                        boxPadding: 5,
                        callbacks: {
                            label: (ctx) => {
                                const val = ctx.parsed.y;
                                if (val == null) return '';
                                const dsLabel = ctx.dataset.label || '';
                                return `${dsLabel}: ${val.toFixed(6)} ${toName}`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: '日期',
                            font: { size: 12, weight: 'bold' },
                            color: '#64748b',
                        },
                        grid: { display: false },
                        ticks: {
                            font: { size: 11 },
                            color: '#94a3b8',
                            maxRotation: 0,
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: `汇率 (${fromName}/${toName})`,
                            font: { size: 12, weight: 'bold' },
                            color: '#64748b',
                        },
                        min: minVal,
                        max: maxVal,
                        grid: {
                            color: 'rgba(226,232,240,0.5)',
                            drawBorder: false,
                        },
                        ticks: {
                            font: { size: 11 },
                            color: '#94a3b8',
                            callback: (val) => val.toFixed(4),
                            count: 6,
                        },
                    }
                },
                interaction: {
                    mode: 'nearest',
                    axis: 'x',
                    intersect: false,
                },
            };
        }

        // ========== 交换货币 ==========
        function swapCurrencies() {
            const tmp = dom.fromCur.value;
            dom.fromCur.value = dom.toCur.value;
            dom.toCur.value   = tmp;
            calculate();
        }

        // ========== 事件绑定 ==========
        dom.calcBtn.addEventListener('click', calculate);
        dom.swapBtn.addEventListener('click', swapCurrencies);
        dom.amount.addEventListener('input', calculate);
        dom.fromCur.addEventListener('change', calculate);
        dom.toCur.addEventListener('change', calculate);

        // ========== 启动 ==========
        init();

    })();
    </script>

</body>
