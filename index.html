<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球实时汇率看板</title>
    <!-- 引入 Chart.js 图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #4f46e5; /* 主题蓝 */
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 30px;
            height: fit-content;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .converter-box {
            display: grid;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-sub);
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box; /* 关键：防止padding撑大宽度 */
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
        }

        .currency-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .currency-select {
            flex: 1;
        }

        .swap-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 40px;
            height: 42px; /* 与输入框高度对齐 */
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            margin-bottom: 1px; /* 微调对齐 */
        }

        .swap-btn:hover {
            transform: rotate(180deg);
            background-color: #4338ca;
        }

        .result-display {
            background-color: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            text-align: right;
            border: 1px solid #e5e7eb;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .rate-info {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-top: 5px;
        }

        .chart-container {
            margin-top: 30px;
            position: relative;
            height: 250px;
            width: 100%;
        }

        .loading-overlay {
            text-align: center;
            color: var(--text-sub);
            font-size: 0.9rem;
            display: none;
        }
        
        .error-msg {
            color: #ef4444;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>
            <span>💱</span> 全球实时汇率看板
        </h1>
    </header>

    <div class="converter-box">
        <!-- 金额输入 -->
        <div class="input-group">
            <label>金额</label>
            <input type="number" id="amount" value="1" min="0" step="any">
        </div>

        <!-- 货币选择行 -->
        <div class="currency-row">
            <div class="input-group currency-select">
                <label>从 (Base)</label>
                <select id="from-currency"></select>
            </div>
            
            <button class="swap-btn" id="swap-btn" title="交换货币">
                ⇄
            </button>

            <div class="input-group currency-select">
                <label>到 (Target)</label>
                <select id="to-currency"></select>
            </div>
        </div>

        <!-- 结果显示 -->
        <div class="input-group">
            <label>结果</label>
            <div class="result-display">
                <div class="result-value" id="result-text">加载中...</div>
                <div class="rate-info" id="rate-text"></div>
            </div>
        </div>
        
        <div class="loading-overlay" id="loading">正在获取最新数据...</div>
        <div class="error-msg" id="error-msg">网络错误，请稍后重试</div>
    </div>

    <!-- 走势图 -->
    <div class="chart-container">
        <canvas id="rateChart"></canvas>
    </div>
</div>

<script>
    // 配置
    const API_BASE = 'https://api.frankfurter.app';
    
    // DOM 元素
    const amountInput = document.getElementById('amount');
    const fromSelect = document.getElementById('from-currency');
    const toSelect = document.getElementById('to-currency');
    const resultText = document.getElementById('result-text');
    const rateText = document.getElementById('rate-text');
    const swapBtn = document.getElementById('swap-btn');
    const loadingDiv = document.getElementById('loading');
    const errorDiv = document.getElementById('error-msg');
    
    let myChart = null;

    // 初始化
    async function init() {
        try {
            showLoading(true);
            // 1. 获取支持的货币列表
            const currencies = await fetchCurrencies();
            populateSelects(currencies);
            
            // 设置默认值 (USD -> CNY)
            fromSelect.value = 'USD';
            toSelect.value = 'CNY';
            
            // 2. 执行第一次转换
            await convertCurrency();
        } catch (error) {
            console.error(error);
            showError(true);
        } finally {
            showLoading(false);
        }
    }

    // 获取货币列表
    async function fetchCurrencies() {
        const res = await fetch(`${API_BASE}/currencies`);
        return await res.json();
    }

    // 填充下拉菜单
    function populateSelects(currencies) {
        const options = Object.entries(currencies).map(([code, name]) => 
            `<option value="${code}">${code} - ${name}</option>`
        ).join('');
        
        fromSelect.innerHTML = options;
        toSelect.innerHTML = options;
    }

    // 核心转换逻辑
    async function convertCurrency() {
        const amount = amountInput.value;
        const from = fromSelect.value;
        const to = toSelect.value;

        if (from === to) {
            updateUI(amount, 1, amount);
            return;
        }

        showLoading(true);
        showError(false);

        try {
            // 调用实时汇率接口
            const res = await fetch(`${API_BASE}/latest?amount=${amount}&from=${from}&to=${to}`);
            const data = await res.json();
            
            const convertedAmount = data.rates[to];
            const rate = convertedAmount / amount;

            updateUI(amount, rate, convertedAmount);
            
            // 更新图表 (获取过去1个月的数据)
            updateChart(from, to);

        } catch (error) {
            console.error("Conversion failed:", error);
            showError(true);
        } finally {
            showLoading(false);
        }
    }

    // 更新界面文字
    function updateUI(amount, rate, result) {
        resultText.innerText = `${result.toFixed(2)} ${toSelect.value}`;
        rateText.innerText = `1 ${fromSelect.value} ≈ ${rate.toFixed(4)} ${toSelect.value}`;
    }

    // 更新图表
    async function updateChart(from, to) {
        // 计算一个月前的日期
        const endDate = new Date();
        const startDate = new Date();
        startDate.setMonth(startDate.getMonth() - 1);
        
        const startStr = startDate.toISOString().split('T')[0];
        const endStr = endDate.toISOString().split('T')[0];

        try {
            const res = await fetch(`${API_BASE}/${startStr}..${endStr}?from=${from}&to=${to}`);
            const data = await res.json();
            
            const labels = Object.keys(data.rates);
            const values = labels.map(date => data.rates[date][to]);

            renderChart(labels, values, `${from} 兑 ${to}`);
        } catch (e) {
            console.log("Chart data fetch failed", e);
        }
    }

    // 渲染 Chart.js 图表
    function renderChart(labels, dataPoints, labelTitle) {
        const ctx = document.getElementById('rateChart').getContext('2d');
        
        if (myChart) {
            myChart.destroy();
        }

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: labelTitle,
                    data: dataPoints,
                    borderColor: '#4f46e5',
                    backgroundColor: 'rgba(79, 70, 229, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3, // 平滑曲线
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { mode: 'index', intersect: false }
                },
                scales: {
                    x: { display: false }, // 隐藏X轴日期让界面更简洁
                    y: { 
                        beginAtZero: false,
                        grid: { color: '#f3f4f6' }
                    }
                }
            }
        });
    }

    // 工具函数
    function showLoading(show) { loadingDiv.style.display = show ? 'block' : 'none'; }
    function showError(show) { errorDiv.style.display = show ? 'block' : 'none'; resultText.innerText = show ? '获取失败' : resultText.innerText; }

    // 事件监听
    amountInput.addEventListener('input', convertCurrency);
    fromSelect.addEventListener('change', convertCurrency);
    toSelect.addEventListener('change', convertCurrency);
    
    swapBtn.addEventListener('click', () => {
        const temp = fromSelect.value;
        fromSelect.value = toSelect.value;
        toSelect.value = temp;
        convertCurrency();
    });

    // 启动
    init();

</script>
</body>
</html>
