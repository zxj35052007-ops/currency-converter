<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时汇率转换器 & 走势图</title>
    <!-- 引入 Chart.js 用于绘制图表 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-color: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
            overflow: hidden;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        /* 转换器区域样式 */
        .converter-box {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 15px;
            align-items: end;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid #e5e7eb;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #6b7280;
        }

        input, select {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
        }

        .swap-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: transform 0.3s;
            margin-bottom: 5px;
        }

        .swap-btn:hover {
            transform: rotate(180deg);
        }

        .result-display {
            text-align: center;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
            min-height: 1.5em;
        }

        /* 图表区域样式 */
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .loading {
            text-align: center;
            color: #6b7280;
            padding: 20px;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .converter-box {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .swap-btn {
                margin: 10px auto;
                transform: rotate(90deg);
            }
            .swap-btn:hover {
                transform: rotate(270deg);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💱 全球实时汇率看板</h1>

    <!-- 货币转换区 -->
    <div class="converter-box">
        <div class="input-group">
            <label>金额</label>
            <input type="number" id="amount" value="1000" min="0">
            <label style="margin-top:10px;">从 (Base)</label>
            <select id="fromCurrency">
                <option value="CNY">CNY - 人民币</option>
                <option value="USD">USD - 美元</option>
                <option value="EUR">EUR - 欧元</option>
                <option value="GBP">GBP - 英镑</option>
                <option value="JPY">JPY - 日元</option>
                <option value="HKD">HKD - 港币</option>
            </select>
        </div>

        <button class="swap-btn" onclick="swapCurrencies()" title="交换货币">⇄</button>

        <div class="input-group">
            <label>结果</label>
            <input type="text" id="result" readonly placeholder="计算中...">
            <label style="margin-top:10px;">到 (Target)</label>
            <select id="toCurrency">
                <option value="USD">USD - 美元</option>
                <option value="CNY">CNY - 人民币</option>
                <option value="EUR">EUR - 欧元</option>
                <option value="GBP">GBP - 英镑</option>
                <option value="JPY">JPY - 日元</option>
                <option value="HKD">HKD - 港币</option>
            </select>
        </div>
    </div>
    
    <div class="result-display" id="rateInfo"></div>

    <!-- 图表区 -->
    <div class="chart-container">
        <canvas id="exchangeChart"></canvas>
    </div>
    <p style="text-align:center; font-size:0.8rem; color:#9ca3af; margin-top:10px;">
        * 数据来源于公开API，仅供参考，不构成投资建议
    </p>
</div>

<script>
    // 全局变量
    let chartInstance = null;
    const amountInput = document.getElementById('amount');
    const fromSelect = document.getElementById('fromCurrency');
    const toSelect = document.getElementById('toCurrency');
    const resultInput = document.getElementById('result');
    const rateInfo = document.getElementById('rateInfo');

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
        updateExchange();
        
        // 监听变化
        amountInput.addEventListener('input', debounce(updateExchange, 500));
        fromSelect.addEventListener('change', updateExchange);
        toSelect.addEventListener('change', updateExchange);
    });

    // 交换货币按钮功能
    function swapCurrencies() {
        const temp = fromSelect.value;
        fromSelect.value = toSelect.value;
        toSelect.value = temp;
        updateExchange();
    }

    // 防抖函数，避免频繁请求API
    function debounce(func, wait) {
        let timeout;
        return function(...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, args), wait);
        };
    }

    // 核心更新函数
    async function updateExchange() {
        const amount = parseFloat(amountInput.value) || 0;
        const from = fromSelect.value;
        const to = toSelect.value;

        if (amount <= 0) {
            resultInput.value = "0.00";
            return;
        }

        try {
            resultInput.value = "加载中...";
            
            // 1. 获取实时汇率 (使用 Frankfurter API，免费无需Key)
            const rateRes = await fetch(`https://api.frankfurter.app/latest?from=${from}&to=${to}`);
            const rateData = await rateRes.json();
            const rate = rateData.rates[to];

            // 2. 计算并显示结果
            const converted = (amount * rate).toFixed(2);
            resultInput.value = converted;
            rateInfo.textContent = `1 ${from} ≈ ${rate.toFixed(4)} ${to}`;

            // 3. 获取历史数据并更新图表
            await updateChart(from, to);

        } catch (error) {
            console.error("API Error:", error);
            resultInput.value = "获取失败";
            rateInfo.textContent = "请检查网络或稍后重试";
        }
    }

    // 更新图表
    async function updateChart(from, to) {
        try {
            // 获取过去30天数据
            const historyRes = await fetch(`https://api.frankfurter.app/last/30?from=${from}&to=${to}`);
            const historyData = await historyRes.json();

            const labels = Object.keys(historyData.rates);
            const dataPoints = labels.map(date => historyData.rates[date][to]);

            renderChart(labels, dataPoints, from, to);
        } catch (e) {
            console.error("Chart data fetch failed", e);
        }
    }

    // 渲染 Chart.js 图表
    function renderChart(labels, data, from, to) {
        const ctx = document.getElementById('exchangeChart').getContext('2d');

        // 如果已存在图表则销毁重建
        if (chartInstance) {
            chartInstance.destroy();
        }

        // 创建渐变背景
        const gradient = ctx.createLinearGradient(0, 0, 0, 300);
        gradient.addColorStop(0, 'rgba(79, 70, 229, 0.2)');
        gradient.addColorStop(1, 'rgba(79, 70, 229, 0)');

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: `${from} / ${to} 汇率走势 (近30天)`,
                    data: data,
                    borderColor: '#4f46e5',
                    backgroundColor: gradient,
                    borderWidth: 2,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    fill: true,
                    tension: 0.4 // 曲线平滑度
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        callbacks: {
                            label: (context) => `汇率: ${context.parsed.y.toFixed(4)}`
                        }
                    }
                },
                scales: {
                    x: { 
                        grid: { display: false },
                        ticks: { maxTicksLimit: 6 }
                    },
                    y: {
                        ticks: {
                            callback: (val) => val.toFixed(3)
                        }
                    }
                },
                interaction: {
                    mode: 'nearest',
                    axis: 'x',
                    intersect: false
                }
            }
        });
    }
</script>

</body>
</html>
