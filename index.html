<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球实时汇率看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ========== CSS 变量 ========== */
        :root {
            --primary: #4f46e5;
            --primary-light: rgba(79, 70, 229, 0.1);
            --bg: #f3f4f6;
            --card: #fff;
            --text: #1f2937;
            --text-sub: #6b7280;
            --border: #e5e7eb;
            --border-dashed: #d1d5db;
            --radius: 8px;
            --radius-lg: 16px;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            --transition: 0.2s ease;
        }

        /* ========== 重置与基础 ========== */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* ========== 主容器 ========== */
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 30px;
            height: fit-content;
        }

        /* ========== 标题 ========== */
        .title {
            text-align: center;
            color: var(--primary);
            margin: 0 0 30px;
            font-size: 24px;
            font-weight: 700;
        }

        /* ========== 表单元素 ========== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 16px;
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
            background: #fff;
            appearance: none;
            -webkit-appearance: none;
        }

        .form-input:focus,
        .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        /* ========== 货币选择行 ========== */
        .currency-row {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .currency-col {
            flex: 1;
        }

        /* ========== 交换按钮 ========== */
        .swap-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2px;
            transition: transform var(--transition);
            font-size: 18px;
            flex-shrink: 0;
        }

        .swap-btn:hover {
            transform: rotate(180deg);
        }

        .swap-btn:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* ========== 主按钮 ========== */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background var(--transition);
        }

        .btn-primary:hover:not(:disabled) {
            background: #4338ca;
        }

        .btn-primary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .btn-primary:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* ========== 结果展示 ========== */
        .result-box {
            background: #f9fafb;
            border: 1px dashed var(--border-dashed);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            margin-top: 30px;
        }

        .result-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin: 10px 0;
        }

        .result-info {
            font-size: 14px;
            color: var(--text-sub);
        }

        /* ========== 图表 ========== */
        .chart-container {
            margin-top: 30px;
            height: 200px;
            width: 100%;
            position: relative;
        }

        /* ========== 状态提示 ========== */
        .status-loading {
            color: var(--primary);
        }

        .status-error {
            color: #ef4444;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 20px;
            }
            .title {
                font-size: 20px;
            }
            .currency-row {
                flex-direction: column;
                gap: 10px;
            }
            .swap-btn {
                align-self: center;
                margin-bottom: 0;
                transform: rotate(90deg);
            }
            .swap-btn:hover {
                transform: rotate(270deg);
            }
        }

        /* ========== 无障碍：屏幕阅读器专用 ========== */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* ========== 打印样式 ========== */
        @media print {
            body {
                background: #fff;
                padding: 0;
            }
            .container {
                box-shadow: none;
            }
            .btn-primary,
            .swap-btn {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- 主容器 -->
    <main class="container" role="main">

        <!-- 标题 -->
        <h1 class="title">💱 全球实时汇率看板</h1>

        <!-- 金额输入 -->
        <div class="form-group">
            <label class="form-label" for="amount">金额</label>
            <input
                class="form-input"
                type="number"
                id="amount"
                value="1"
                min="0"
                step="any"
                inputmode="decimal"
                aria-describedby="amount-hint"
            >
            <span id="amount-hint" class="sr-only">请输入要转换的金额，支持小数</span>
        </div>

        <!-- 货币选择 -->
        <div class="currency-row">
            <div class="currency-col">
                <label class="form-label" for="fromCur">源货币</label>
                <select class="form-select" id="fromCur" aria-label="选择源货币"></select>
            </div>

            <button
                class="swap-btn"
                id="swapBtn"
                type="button"
                aria-label="交换源货币与目标货币"
                title="交换源货币与目标货币"
            >⇄</button>

            <div class="currency-col">
                <label class="form-label" for="toCur">目标货币</label>
                <select class="form-select" id="toCur" aria-label="选择目标货币"></select>
            </div>
        </div>

        <!-- 转换按钮 -->
        <button class="btn-primary" id="calcBtn" type="button">开始转换</button>

        <!-- 结果展示 -->
        <section class="result-box" aria-live="polite" aria-atomic="true">
            <div class="result-info" id="rateInfo">等待输入...</div>
            <div class="result-value" id="resVal" aria-label="转换结果">---</div>
        </section>

        <!-- 图表 -->
        <section class="chart-container" aria-label="汇率走势图">
            <canvas id="chart"></canvas>
        </section>

    </main>

    <script>
    (() => {
        'use strict';

        // ========== 常量 ==========
        const CURRENCY_NAMES = {
            'CNY': '人民币', 'USD': '美元', 'EUR': '欧元', 'GBP': '英镑', 'JPY': '日元',
            'HKD': '港币', 'TWD': '新台币', 'KRW': '韩元', 'SGD': '新加坡元', 'AUD': '澳元',
            'CAD': '加拿大元', 'CHF': '瑞士法郎', 'THB': '泰铢', 'MYR': '马来西亚林吉特',
            'RUB': '俄罗斯卢布', 'INR': '印度卢比', 'VND': '越南盾', 'PHP': '菲律宾比索',
            'IDR': '印尼盾', 'NZD': '新西兰元', 'SEK': '瑞典克朗', 'NOK': '挪威克朗',
            'DKK': '丹麦克朗', 'PLN': '波兰兹罗提', 'TRY': '土耳其里拉', 'ZAR': '南非兰特',
            'MXN': '墨西哥比索', 'BRL': '巴西雷亚尔', 'AED': '阿联酋迪拉姆', 'SAR': '沙特里亚尔'
        };

        const API_URL  = 'https://api.exchangerate-api.com/v4/latest/USD';
        const STALE_MS  = 30 * 60 * 1000; // 30 分钟缓存
        const CACHE_KEY = 'fx_rates_cache';

        // ========== DOM 引用（一次性获取） ==========
        const $ = (id) => document.getElementById(id);
        const dom = {
            amount:  $('amount'),
            fromCur: $('fromCur'),
            toCur:   $('toCur'),
            calcBtn: $('calcBtn'),
            swapBtn: $('swapBtn'),
            rateInfo:$('rateInfo'),
            resVal:  $('resVal'),
            chart:   $('chart'),
        };

        // ========== 状态 ==========
        let rates     = {};
        let chartInst = null;

        // ========== 工具函数 ==========
        const getName = (code) => CURRENCY_NAMES[code] || code;

        /**
         * 带过期时间的 localStorage 缓存读取
         */
        function loadRatesCache() {
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                const { data, ts } = JSON.parse(raw);
                if (Date.now() - ts > STALE_MS) return null;
                return data;
            } catch {
                return null;
            }
        }

        function saveRatesCache(data) {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify({ data, ts: Date.now() }));
            } catch { /* 静默失败 */ }
        }

        // ========== 初始化 ==========
        async function init() {
            const btn = dom.calcBtn;

            // 尝试使用缓存
            const cached = loadRatesCache();
            if (cached) {
                rates = cached;
                populateSelects();
                calculate();
                btn.innerText = '开始转换';
                btn.disabled = false;
                return;
            }

            btn.innerText = '数据加载中...';
            btn.disabled = true;

            try {
                const res  = await fetch(API_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                rates = data.rates;
                saveRatesCache(rates);
                populateSelects();
                calculate();
                btn.innerText = '开始转换';
                btn.disabled = false;
            } catch (e) {
                console.error('汇率数据加载失败：', e);
                dom.rateInfo.innerText = '网络异常，请刷新重试';
                dom.rateInfo.classList.add('status-error');
                btn.innerText = '重新加载';
                btn.disabled = false;
            }
        }

        // ========== 下拉框填充 ==========
        function populateSelects() {
            const codes = Object.keys(rates).sort(
                (a, b) => getName(a).localeCompare(getName(b), 'zh')
            );
            fillSelect(dom.fromCur, codes, 'USD');
            fillSelect(dom.toCur,   codes, 'CNY');
        }

        function fillSelect(el, codes, defaultCode) {
            // 使用 DocumentFragment 减少重排
            const frag = document.createDocumentFragment();
            codes.forEach((c) => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = `${getName(c)}（${c}）`;
                if (c === defaultCode) opt.selected = true;
                frag.appendChild(opt);
            });
            el.innerHTML = '';
            el.appendChild(frag);
        }

        // ========== 核心计算 ==========
        function calculate() {
            const amt = parseFloat(dom.amount.value);
            if (isNaN(amt) || amt < 0) {
                dom.resVal.innerText = '请输入有效金额';
                dom.rateInfo.innerText = '';
                return;
            }

            const from = dom.fromCur.value;
            const to   = dom.toCur.value;

            if (!rates[from] || !rates[to]) return;

            const rate    = rates[to] / rates[from];
            const result  = (amt * rate).toFixed(2);
            const fromName = getName(from);
            const toName   = getName(to);

            dom.resVal.innerText   = `${result} ${toName}`;
            dom.rateInfo.innerText = `1 ${fromName} ≈ ${rate.toFixed(4)} ${toName}`;

            updateChart(rate, from, to);
        }

        // ========== 图表更新 ==========
        function updateChart(curRate, from, to) {
            const ctx = dom.chart.getContext('2d');

            // 使用更真实的模拟走势（基于当前汇率的随机波动）
            const points = [];
            for (let i = 6; i >= 0; i--) {
                const jitter = 1 + (Math.random() - 0.5) * 0.04;
                points.push(i === 6 ? curRate : points[points.length - 1] * jitter);
            }

            const chartData = {
                labels: ['6天前', '5天前', '4天前', '3天前', '2天前', '昨天', '今天'],
                datasets: [{
                    label: `${getName(from)} 兑 ${getName(to)} 走势`,
                   ,
                    borderColor: '#4f46e5',
                    backgroundColor: 'rgba(79,70,229,0.1)',
                    tension: 0.4,
                    fill: true,
                    pointRadius: 3,
                    pointHoverRadius: 5,
                }]
            };

            const chartOpts = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                    }
                },
                scales: {
                    y: {
                        beginAtZero: false,
                        ticks: {
                            callback: (val) => val.toFixed(4)
                        }
                    }
                },
                interaction: {
                    mode: 'nearest',
                    axis: 'x',
                    intersect: false,
                }
            };

            if (chartInst) {
                chartInst.data = chartData;
                chartInst.options = chartOpts;
                chartInst.update();
            } else {
                chartInst = new Chart(ctx, {
                    type: 'line',
                    data: chartData,
                    options: chartOpts
                });
            }
        }

        // ========== 交换货币 ==========
        function swapCurrencies() {
            const tmp = dom.fromCur.value;
            dom.fromCur.value = dom.toCur.value;
            dom.toCur.value   = tmp;
            calculate();
        }

        // ========== 事件绑定 ==========
        dom.calcBtn.addEventListener('click', calculate);
        dom.swapBtn.addEventListener('click', swapCurrencies);

        // 输入变化时实时计算
        dom.amount.addEventListener('input', calculate);
        dom.fromCur.addEventListener('change', calculate);
        dom.toCur.addEventListener('change', calculate);

        // ========== 启动 ==========
        init();

    })();
    </script>

</body>
</html>
