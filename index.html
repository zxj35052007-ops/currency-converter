<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>全球实时汇率看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #4f46e5; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        #result { font-size: 1.2em; font-weight: bold; margin-top: 10px; }
        canvas { max-width: 100%; height: 300px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1 style="text-align:center;">💱 全球实时汇率看板</h1>
    
    <div class="input-group">
        <input type="number" id="amount" value="10" placeholder="金额">
        <select id="fromCurrency">
            <option value="USD">USD - 美元</option>
            <option value="CNY">CNY - 人民币</option>
            <option value="EUR">EUR - 欧元</option>
        </select>
        <button onclick="convert()">转换</button>
        <select id="toCurrency">
            <option value="CNY">CNY - 人民币</option>
            <option value="USD">USD - 美元</option>
            <option value="EUR">EUR - 欧元</option>
        </select>
    </div>
    
    <div id="result">结果：等待输入...</div>
    <canvas id="rateChart"></canvas>

    <script>
        async function convert() {
            const amount = document.getElementById('amount').value;
            const from = document.getElementById('fromCurrency').value;
            const to = document.getElementById('toCurrency').value;
            
            try {
                // 使用 xxapi.cn 接口
                const response = await fetch(`https://v2.xxapi.cn/api/exchange?from=${from}&to=${to}&amount=${amount}`);
                const data = await response.json();
                
                if (data.code === 200) {
                    document.getElementById('result').innerText = `结果：${data.data.result} ${to}`;
                    drawChart(from, to);
                } else {
                    document.getElementById('result').innerText = '获取失败，请检查网络或稍后重试';
                }
            } catch (error) {
                document.getElementById('result').innerText = '获取失败，请检查网络或稍后重试';
            }
        }

        async function drawChart(from, to) {
            // 模拟历史数据（实际项目中可调用历史API）
            const labels = ['1天前', '2天前', '3天前', '4天前', '5天前'];
            const dataPoints = [7.2, 7.18, 7.22, 7.19, 7.21]; // 示例数据
            
            const ctx = document.getElementById('rateChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `${from}/${to} 汇率走势`,
                        data: dataPoints,
                        borderColor: '#4f46e5',
                        fill: false
                    }]
                },
                options: { responsive: true }
            });
        }

        // 页面加载时自动转换一次
        window.onload = convert;
    </script>
</body>
</html>
